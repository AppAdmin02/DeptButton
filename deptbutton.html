<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: visible;
    }

    .btn-wrap {
      position: relative;
      display: inline-block;
    }

    /* ── Main button ── */
    #dept-btn {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background-color: #FFD101;
      color: #0B233F;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      letter-spacing: 0.01em;
      cursor: pointer;
      white-space: nowrap;
      transition: background-color 0.15s ease, transform 0.1s ease;
      user-select: none;
    }

    #dept-btn:hover {
      background-color: #e6bc00;
    }

    #dept-btn:active {
      transform: scale(0.97);
    }

    /* Chevron icon inside button */
    #dept-btn .chevron {
      width: 12px;
      height: 12px;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    #dept-btn.open .chevron {
      transform: rotate(180deg);
    }

    /* Single-dept version — no chevron, renders as plain link-style button */
    #dept-btn.single {
      text-decoration: none;
      display: inline-flex;
    }

    /* ── Loading state ── */
    #dept-loading {
      color: #FFD101;
      font-size: 14px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Error state ── */
    #dept-error {
      display: none;
      color: #FFD101;
      font-size: 13px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* ── Dropdown panel ── */
    #dept-dropdown {
      display: none;
      position: fixed; /* fixed so it escapes iframe clip */
      z-index: 9999;
      min-width: 220px;
      background-color: #0B233F;
      border-top: 3px solid #FFD101;
      border-radius: 0 0 4px 4px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
      overflow: hidden;
    }

    #dept-dropdown.visible {
      display: block;
    }

    .dept-option {
      display: block;
      width: 100%;
      padding: 12px 18px;
      background: none;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 14px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: background-color 0.12s ease, color 0.12s ease;
      white-space: nowrap;
    }

    .dept-option:last-child {
      border-bottom: none;
    }

    .dept-option:hover {
      background-color: #FFD101;
      color: #0B233F;
    }

    .dept-option:active {
      background-color: #e6bc00;
    }
  </style>
</head>
<body>

  <div class="btn-wrap" id="btn-wrap">

    <!-- Loading indicator -->
    <span id="dept-loading">Loading...</span>

    <!-- Error state -->
    <span id="dept-error">Unable to load</span>

    <!-- Single-department: renders as anchor -->
    <!-- Multi-department: renders as button that opens dropdown -->
    <a id="dept-btn" href="#" tabindex="0" aria-haspopup="listbox" aria-expanded="false">
      MyFiles
      <!-- Chevron SVG — hidden for single-dept via .single class -->
      <svg class="chevron" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M2 4L6 8L10 4" stroke="#0B233F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>

    <!-- Dropdown panel (multi-dept only) -->
    <div id="dept-dropdown" role="listbox" aria-label="Your departments"></div>

  </div>

  <script>
    // ── CONFIG — update these before uploading ───────────────────────────────
    const MAPPINGS_SITE = "https://o365usm.sharepoint.com/sites/NewTeamUSM";
    const FALLBACK_URL  = "https://o365usm.sharepoint.com/sites/NewTeamUSM";
    // ─────────────────────────────────────────────────────────────────────────

    const btn        = document.getElementById("dept-btn");
    const dropdown   = document.getElementById("dept-dropdown");
    const loading    = document.getElementById("dept-loading");
    const errorMsg   = document.getElementById("dept-error");

    // ── Utility: authenticated fetch returning JSON ───────────────────────────
    async function getJson(url, token) {
      const headers = { "Accept": "application/json;odata=nometadata" };
      if (token) headers["Authorization"] = "Bearer " + token;
      const r = await fetch(url, { headers });
      if (!r.ok) throw new Error(`HTTP ${r.status} — ${url}`);
      return r.json();
    }

    // ── MSAL config ───────────────────────────────────────────────────────────
    // Requires MSAL.js loaded below. Acquires token silently using the user's
    // existing M365 session — no login prompt in normal operation.
    const msalConfig = {
      auth: {
        clientId:   "00000003-0000-0000-c000-000000000000", // MS Graph app ID (constant)
        authority:  "https://login.microsoftonline.com/common",
        redirectUri: window.location.origin
      },
      cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: false }
    };

    const tokenRequest = {
      scopes: ["User.Read", "GroupMember.Read.All"],
      prompt: "none" // silent — never show a login popup
    };

    // ── Main logic ────────────────────────────────────────────────────────────
    async function init() {
      let matches = [];
      try {
    // 1. Acquire Graph token via MSAL
      const msalInstance = new msal.PublicClientApplication(msalConfig);
      await msalInstance.initialize();

    // Clear any stale interaction lock from previous failed attempts
    Object.keys(sessionStorage)
      .filter(k => k.includes('interaction.status'))
      .forEach(k => sessionStorage.removeItem(k));

    let tokenResponse;
    const accounts = msalInstance.getAllAccounts();

    if (accounts.length === 0) {
      // No cached session — require interactive login
      try {
        const loginResponse = await msalInstance.loginPopup({
          scopes: ["GroupMember.Read.All"]
        });
        msalInstance.setActiveAccount(loginResponse.account);
        tokenResponse = loginResponse;
      } catch (loginErr) {
        console.error("Login popup failed:", loginErr);
        showError();
        return;
      }
    } else {
      // Account found — try silent, fall back to popup
      try {
        tokenResponse = await msalInstance.acquireTokenSilent({
          ...tokenRequest,
          account: accounts[0]
        });
      } catch (silentErr) {
        console.warn("Silent token acquisition failed:", silentErr);
        try {
          tokenResponse = await msalInstance.acquireTokenPopup(tokenRequest);
        } catch (popupErr) {
          console.error("Popup token acquisition failed:", popupErr);
          showError();
          return;
        }
      }
    }

    const token = tokenResponse.accessToken;

    // 2. Get user's transitive group memberships from Graph
    const graphData = await getJson(
      "https://graph.microsoft.com/v1.0/me/transitiveMemberOf/microsoft.graph.group?$select=displayName&$top=200",
      token
    );
    const userGroups = graphData.value.map(g => g.displayName);

    // 3. Load DepartmentMappings list from SharePoint
    const listData = await getJson(
      `${MAPPINGS_SITE}/_api/web/lists/getbytitle('DepartmentMappings')/items?$select=GroupName,SiteUrl,DeptLabel&$top=100`
    );

    // 4. Find all matching groups
    matches = listData.value.filter(item =>
      userGroups.includes(item.GroupName)
    );

  } catch (err) {
    console.error("DeptButton error:", err);
    showError();
    return;
  }

  if (matches.length === 0) {
    showSingle(FALLBACK_URL);
  } else if (matches.length === 1) {
    showSingle(matches[0].SiteUrl);
  } else {
    showMulti(matches);
  }
}
    // ── Render: single department ─────────────────────────────────────────────
    function showSingle(url) {
      loading.style.display = "none";
      btn.href = url;
      btn.classList.add("single");
      // Hide chevron for single-dept
      btn.querySelector(".chevron").style.display = "none";
      btn.style.display = "inline-flex";
    }

    // ── Render: multiple departments ──────────────────────────────────────────
    function showMulti(departments) {
      loading.style.display = "none";

      // Build dropdown options
      dropdown.innerHTML = "";
      departments.forEach(dept => {
        const opt = document.createElement("button");
        opt.className = "dept-option";
        opt.role = "option";
        // Use DeptLabel column if populated, otherwise fall back to GroupName
        opt.textContent = dept.DeptLabel || dept.GroupName;
        opt.addEventListener("click", () => {
          window.top.location.href = dept.SiteUrl;
        });
        dropdown.appendChild(opt);
      });

      btn.style.display = "inline-flex";

      // Toggle dropdown open/close
      btn.addEventListener("click", (e) => {
        e.preventDefault();
        const isOpen = dropdown.classList.contains("visible");
        if (isOpen) {
          closeDropdown();
        } else {
          openDropdown();
        }
      });

      // Close on outside click
      document.addEventListener("click", (e) => {
        if (!e.target.closest("#btn-wrap")) closeDropdown();
      });

      // Close on Escape
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeDropdown();
      });
    }

    function openDropdown() {
      // Position the dropdown relative to the button using fixed coords
      const rect = btn.getBoundingClientRect();
      dropdown.style.top  = (rect.bottom + 4) + "px";
      dropdown.style.left = rect.left + "px";
      dropdown.classList.add("visible");
      btn.classList.add("open");
      btn.setAttribute("aria-expanded", "true");
    }

    function closeDropdown() {
      dropdown.classList.remove("visible");
      btn.classList.remove("open");
      btn.setAttribute("aria-expanded", "false");
    }

    // ── Error state ───────────────────────────────────────────────────────────
    function showError() {
      loading.style.display = "none";
      errorMsg.style.display = "inline";
    }

    // ── Bootstrap: load MSAL then run ─────────────────────────────────────────
    const msalScript = document.createElement("script");
    msalScript.src = "https://o365usm.sharepoint.com/sites/NewTeamUSM/WebAssets/msal-browser.min.js";
    msalScript.onload = init;
    msalScript.onerror = () => {
      console.error("Failed to load MSAL.js");
      showError();
    };
    document.head.appendChild(msalScript);
  </script>

</body>
</html>
